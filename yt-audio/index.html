<!DOCTYPE html>
<html>
<head>
  <title>YT Audio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>

    /* Global styling */

    :root {
      --color-text: #ccc;
    }

    html, body {
      overscroll-behavior: none;
      overflow: hidden;  /* prevent page scroll */
    }

    body {
      padding: 20px;
      background: #141414;
      color: var(--color-text);
      font-family: system-ui, -apple-system, sans-serif;
    }

    hr {
      margin: 20px 0;
      border: none;
      height: 1px;
      background-color: #222;
    }

    input, button {
      background: #1a1d24;
      color: var(--color-text);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px;
    }
    input:focus {
      color: white;
      outline: none !important;
      box-shadow: 0 0 16px #444;
    }
    button {
      cursor: pointer;
    }
    button:active {
      background-color: darkred;
    }

    a {
      color: #4da3ff;
      text-decoration: none;
    }

    img {
      border-radius: 4px;
    }

    p {
      margin-top: 0;
      margin-bottom: .5lh;
    }

    /* Utiliy classes */

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .scroll-pane {
      overflow-y: auto;  /* allow results scroll */
    }

    /* Specific components styling */

    .app {
      display: grid;
      grid-template-rows: auto 1fr;  /* explicit rows */
      height: calc(100dvh - 40px);
    }

    .header {
      min-width: 0; /* necessary for #trackname overflow */
    }
    #trackname {
      min-height: 1lh;
      white-space: nowrap;
      overflow: scroll;
      scrollbar-width: none;
    }

    #results .result-item {
      margin-bottom: 32px;
      font-size: 85%;
      align-items: flex-start;
      gap: 18px;
    }
    #results .result-item:hover img {
      filter: brightness(0.7);
    }
    #results .result-item img.thumbnail {
      width: 120px;
    }
    #results .result-item button {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      padding: 0;
      opacity: .5;
    }
    #results .result-item button.result-play {
      position: absolute;
      bottom: 2px;
      right: 2px;
      background-color: darkred;
    }
    #results .result-item button.result-enqueue {
      position: absolute;
      bottom: 2px;
      left: 2px;
      background-color: #333;
    }

    .progress {
      height: 10px;
      border-radius: 4px;
      background: #222;
      position: relative;
      cursor: pointer;
    }
    .progress .buffered {
      position: absolute;
      height: 100%;
      background: #444;
      width: 0%;
    }
    .progress .played {
      position: absolute;
      height: 100%;
      background: #4da3ff;
      width: 0%;
    }

    /* Mobile */

    @media (max-width: 420px) {
      body {
        font-size: 90%;
        padding: 10px;
      }
      h1, button {
        font-size: 80% !important;
      }
      #results .result-item img.thumbnail {
        width: 80px;
      }
    }
  </style>
</head>

<body>
<div class="app">
  <div class="header">
    <!-- HEADER -->
    <div class="row" style="align-items:center">
      <h1 style="font-size: 24px; color: gray; margin-top:0">
        <span>🎧</span>
        <span>YT Audio</span>
      </h1>
      <!--
      <div>
        <a href="https://github.com/damiencorpataux/yt-dlp-audio-api">
          <img height="15px" src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg">
          Fork me
        </a>
      </div>
      -->
    </div>

    <!-- PLAYER -->
    <div class="row" style="align-items:center; gap:24px; margin-bottom:12px">
      <span id="trackname" style="flex:1;margin-left:16px"></span>
      <button id="playlist-toggle">
        ≡
      </button>
    </div>
    <div class="row" style="gap:12px; align-items:center; justify-content:space-between">
      <div>
        <button id="play" style="width:36px">⌛</button>
        <button id="play-rev" style="width:28px">⏪︎</button>
        <button id="play-ffwd" style="width:28px">⏩︎</button>
      </div>
      <span id="time_current" style="font-family:monospace">0:00</span>
      <div id="progressBar" class="progress" style="flex:1">
        <div id="bufferedBar" class="buffered"></div>
        <div id="playedBar" class="played"></div>
      </div>
      <span id="time_total" style="font-family:monospace">0:00</span>
    </div>
    <hr>
    <div id="playlist-container">
      <div id="playlist" style="min-height:0; max-height:21vh; overflow:scroll"></div>
      <hr>
    </div>
  </div>

  <div class="scroll-pane">
    <!-- SEARCH -->
    <form class="row" style="margin-bottom:16px" onsubmit="search(); return false;">
      <input id="searchInput" autofocus placeholder="♪ Search or paste URL" style="flex:1">
      <button>Search</button>
    </form>

    <!-- RESULTS -->
    <div id="results"></div>
  </div>

  <audio id="audio"></audio>
</div>

<script>
const API_URL = "";

const ui = {
  audio: document.getElementById("audio"),
  search: document.getElementById("searchInput"),
  results: document.getElementById("results"),
  trackname: document.getElementById("trackname"),
  play: document.getElementById("play"),
  play_ffwd: document.getElementById("play-ffwd"),
  play_rev: document.getElementById("play-rev"),
  time_current: document.getElementById("time_current"),
  time_total: document.getElementById("time_total"),
  playedBar: document.getElementById("playedBar"),
  bufferedBar: document.getElementById("bufferedBar"),
  progressBar: document.getElementById("progressBar"),
  playlist: document.getElementById("playlist"),
  playlist_toggle: document.getElementById("playlist-toggle")
};

/* ---------------- HELPERS --------------- */

function get_track_duration() {
  // NOTE: In Chrome, ui.audio.duration is Infinity without Content-Length, ie. when using route /stream/mp3.
  return isFinite(ui.audio.duration) ? ui.audio.duration : playlist[playlist_position].duration;
}

function formatTime(t, fallback) {
  if (!isFinite(t) || t == null) return fallback || '?:??';
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.textContent;
}

/* ---------------- SEARCH ---------------- */

function isURL(str) {
  return str.startsWith("http://") || str.startsWith("https://");
}

async function search() {
  const q = ui.search.value.trim();
  if (q.length < 1) return;

  // 🔥 Direct play if URL
  if (isURL(q)) {
    ui.results.innerHTML = `🎶 Playing <q>${q}</q>...`;
    play_url(q);
    return;
  }

  ui.search.parentNode.querySelector("button").disabled = true;
  ui.results.innerHTML = `🎶 Searching for <q>${escapeHTML(q)}</q>...`;

  let data;
  try {
    const res = await fetch(`${API_URL}/search?q=${encodeURIComponent(q)}`);
    data = await res.json();
  } catch(e) {
    alert(`❌ Search failed. Please try again.\n\n${String(e)}`);
    ui.results.innerHTML = "";
    throw(e);
  } finally {
    ui.search.parentNode.querySelector("button").disabled = false;
    ui.search.blur();
  }

  ui.search.value = "";
  ui.results.innerHTML = "";

  data.results.forEach(track => {
    const div = document.createElement("div");
    div.className = "row result-item";

    div.innerHTML = `
      <div style="position:relative; display:inline-block;">
        <img class="thumbnail" src="${track.thumbnail}" style="display:block">
        <button class="result-play" style="position:absolute; bottom:2px; right:2px">
          ▶︎
        </button>
        <button class="result-enqueue" style="position:absolute; bottom:2px; right:2px">
          ≡
        </button>
      </div>
      <div style="flex:1;">
        <p><strong>${escapeHTML(track.title)}</strong></p>
        <p>${formatTime(track.duration, '-')}</p>
        <p>
          <img width="16px" alt="${track.provider}" src="${
            {
              'bandcamp': 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Bandcamp-button-bc-circle-green.svg/960px-Bandcamp-button-bc-circle-green.svg.png',
              'youtube': 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/YouTube_full-color_icon_%282024%29.svg/1280px-YouTube_full-color_icon_%282024%29.svg.png'
            }[track.provider] || 'default_url'
          }">
          ${escapeHTML(track.channel)}
        </p>
      </div>
    `;

    div.querySelector("button.result-play").onclick = () => play_position(enqueue(track));
    div.querySelector("button.result-enqueue").onclick = () => enqueue(track);

    ui.results.appendChild(div);
  });
}

/* --------------- PLAYLIST --------------- */

let playlist_position = parseInt(localStorage.playlist_position) || 0;  // Private
const playlist = JSON.parse(localStorage.playlist || null) || [];
// const playlist = [{"url":"https://songforberta.bandcamp.com/track/song-for-berta-unmixed-demo","title":"Song for Berta - Unmixed Demo","channel":"by Damien Rice, JFDR, Sandrayati Fay","thumbnail":"https://f4.bcbits.com/img/a2705409571_7.jpg","description":"tags:Acoustic,Honduras,acoustic","duration":null,"provider":"bandcamp"},{"url":"https://marcgartman.bandcamp.com/track/damien","title":"DAMIEN","channel":"by DAMIEN","thumbnail":"https://f4.bcbits.com/img/a2686841425_7.jpg","description":"tags:electronic,acoustic,UnitedStates,bedroom-pop,popelectronic,singersongwriter;folk,Minnesota,Rock,Duluth","duration":null,"provider":"bandcamp"},{"url":"https://onnset.bandcamp.com/track/damien-schneider-seti-ansome-remix","title":"Damien Schneider - Seti (Ansome Remix)","channel":"from ONNST003 - Damien Schneider - Seti EP (Ansome Remix) by Damien Schneider","thumbnail":"https://f4.bcbits.com/img/a2602295058_7.jpg","description":"","duration":null,"provider":"bandcamp"}];

function enqueue(track) {
  // If track is already in playlist, don't add it and simply scroll playlist to the track
  for (const [i, playlist_track] of playlist.entries()) {
    if (playlist_track.url == track.url) {
      ui.playlist.children[i].scrollIntoView({behavior:"smooth"});
      // FIXME: Move to existing track to last position of playlist, to avoid jumping back on playlist ?
      return i;
    }
  }
  // Else append track to playlist
  if (track) playlist.push(track);
  localStorage.playlist = JSON.stringify(playlist);
  playlist_redraw();
  return playlist.length;
}
function dequeue(position) {
  if (!Number.isInteger(position)) return;
  if (confirm("Remove track from playlist ?")) {
    playlist.splice(position, 1);
    localStorage.playlist = JSON.stringify(playlist);
    playlist_redraw();
  }
}

function playlist_redraw() {
  ui.playlist.innerHTML = '';
  for (const [i, track] of playlist.entries()) {
    const div = document.createElement("div");
    div.innerHTML += `
      <p class="row" style="gap:12px; align-items:center; cursor:pointer">
        <button class="playlist-play">▶︎</button>
        <img width="24px" src="${track.thumbnail}">
        <span style="flex:1">
        ${track.title}
        ${(track.duration) ? formatTime(track.duration) : ''}
        </span>
        <button class="playlist-remove">╳</button>
      </p>
    `;
    div.querySelector("button.playlist-play").addEventListener("click", () => play_position(i));
    div.querySelector("button.playlist-remove").addEventListener("click", () => dequeue(i));
    if (i == playlist_position) {
      div.style.backgroundColor = "#222";
    }
    ui.playlist.appendChild(div);
  }
}
playlist_redraw();

function playlistToggle() {
  // TODO: Make tri-state toggle: collapsed, displayed (height:21vh), expanded (height:100vh-playerheight)
  if (ui.playlist.parentNode.style.display) {
    ui.playlist.parentNode.style.display =  "";
    ui.playlist_toggle.style.borderColor = "darkred";
  } else {
    ui.playlist.parentNode.style.display = "none";
    ui.playlist_toggle.style.borderColor = null;
  }
}
ui.playlist_toggle.addEventListener("click", playlistToggle);
playlistToggle();

/* ---------------- PLAYER ---------------- */

function play_next() {
  const next = playlist_position+1;
  if (next < playlist.length) play_position(next);
  else console.log("Playlist ended");
}
ui.audio.addEventListener("ended", play_next);

/**
 * Play position in playlist.
 */
function play_position(position) {
  if (!Number.isInteger(position) || position < 0 || position > playlist.length-1) {
    console.warn("Play position is outside playlist range", position);
    return;
  }
  playlist_position = position;
  localStorage.playlist_position = playlist_position;
  playlist_redraw();
  ui.playlist.children[position].scrollIntoView({behavior:"smooth"});
  const track = playlist[position];
  console.log('Playing playlist position', position, track);
  play_url(track.url);
}
async function play_url(url) {
  // TODO: Extract load logic into function `load_url(url)` ?
  ui.play.innerHTML = "⌛";
  ui.trackname.innerHTML = '♪ Loading track...'

  console.debug('Loading info for URL', url);
  const info_res = await fetch(`${API_URL}/info?url=${encodeURIComponent(url)}`)
  const info = await info_res.json();
  ui.trackname.innerHTML = escapeHTML(info.title || 'Unknown track name');
  //document.title = `YT Audio - ${ui.trackname.innerHTML}`;

  // Play direct URL
  try {
    console.debug(`Playing direct stream URL (${info.acodec})`, info.url);
    ui.audio.src = info.url;
    await ui.audio.play();
    return;
  } catch(e) {
    console.log('Failed to play direct URL', e);
  }

  // Play fallback proxy URL (mp3 transcoded)
  try {
    const proxy_url = `${API_URL}/stream/mp3?url=${encodeURIComponent(url)}`;
    console.log('Playing fallback proxy URL (mp3)', proxy_url);
    ui.audio.src = proxy_url;
    await ui.audio.play();
  } catch(e) {
    if (e.name == "AbortError") return;  // skip user aborted error
    alert(`❌ Playback failed. Please try again.\n\n${String(e)}`);
    ui.trackname.innerHTML = '';
    throw(e);
  }
}

function playToggle() {
  if (ui.play.disabled) return;
  const audio_loaded = ui.audio.readyState >= 4;
  if (ui.audio.paused) {
    if (audio_loaded) {
      ui.audio.play();  // if audio is loaded, then play the audio
    } else if (playlist.length) {
      play_position(playlist_position);  // if no audio is loaded, then play the position in playlist
    } else {
      alert("𝄞 Please search for music to play !");  // if nothing to play
    }
  } else {
    ui.audio.pause();
  }
}
function playFfwd() {
  ui.audio.currentTime += 5;
}
function playRev() {
  ui.audio.currentTime -= 5;
}
ui.play.addEventListener("click", playToggle);
ui.play_ffwd.addEventListener("click", playFfwd);
ui.play_rev.addEventListener("click", playRev);

// Update playback time & progress bar
ui.audio.addEventListener("timeupdate", () => {
  const current = ui.audio.currentTime;
  const duration = get_track_duration();

  ui.time_current.textContent = formatTime(current);
  ui.time_total.textContent = formatTime(duration);
  if (duration > 0) {
    ui.playedBar.style.width = (current / duration * 100) + "%";
  }
});

// Handle play button enable/disable state and icon
function playEnable(enable) {
  if (enable) {
    const icon = ui.audio.paused ? "⏸︎" : "▶︎";
    ui.play.innerHTML = icon;
    ui.play.disabled = false;
  } else {
    ui.play.innerHTML = "⌛";
    ui.play.disabled = true;
  }
}
playEnable(true);  // Initalize as enabled
ui.audio.addEventListener("canplay", () => playEnable(true));
ui.audio.addEventListener("loadstart", () => playEnable(false));
ui.audio.addEventListener("waiting", () => playEnable(false));
ui.audio.addEventListener("play", () => playEnable(true));
ui.audio.addEventListener("pause", () => playEnable(true));

// Track duration progress bar
ui.audio.addEventListener("progress", () => {
  const duration = get_track_duration();
  if (ui.audio.buffered.length > 0 && duration > 0) {

    const bufferedEnd = ui.audio.buffered.end(ui.audio.buffered.length - 1);

    const percent = (bufferedEnd / duration) * 100;
    ui.bufferedBar.style.width = percent + "%";
  }
});

// Track seeking on progress bar
function handleSeek(clientX) {
  if (!ui.audio.duration) return;
  const duration = get_track_duration();
  const rect = ui.progressBar.getBoundingClientRect();
  const ratio = (clientX - rect.left) / rect.width;
  const targetTime = ratio * (duration);
  console.log("Seeking to", targetTime)
  ui.audio.currentTime = targetTime;
}
ui.progressBar.addEventListener("click", (e) => handleSeek(e.clientX));  // Desktop
ui.progressBar.addEventListener("touchstart", (e) => handleSeek(e.touches[0].clientX));  // Mobile

/* ---------------- HOTKEYS ---------------- */

document.addEventListener("keydown", (e) => {
  
  if (["INPUT"].includes(e.target.tagName)) return;

  let preventDefault = true;
  if      (e.code == "Space")      playToggle();
  else if (e.code == "ArrowRight") playFfwd();
  else if (e.code == "ArrowLeft")  playRev();
  else preventDefault = false;

  if (preventDefault) e.preventDefault();
  if (preventDefault) console.log('Hotkey prevented default')
});

// Debug
ui.audio.addEventListener("loadstart", () => console.log("loadstart"));
ui.audio.addEventListener("loadedmetadata", () => console.log("metadata loaded"));
ui.audio.addEventListener("canplay", () => console.log("can play"));
ui.audio.addEventListener("waiting", () => console.log("waiting"));
ui.audio.addEventListener("stalled", () => console.log("stalled"));
ui.audio.addEventListener("ended", (e) => console.log("ended", e));

</script>

</body>
</html>
