<!DOCTYPE html>
<html>
<head>
  <title>YT Audio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>

    /* Global styling */

    body {
      background: #111;
      color: #e6e6e6;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    hr {
      margin: 20px 0;
      border: none;
      height: 1px;
      background-color: #222;
    }

    input, button {
      background: #1a1d24;
      color: #e6e6e6;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px;
    }

    button:active {
      background-color: darkred;
    }

    a {
      color: #4da3ff;
      text-decoration: none;
    }

    img {
      border-radius: 4px;
    }

    p {
      margin-top: 0;
    }

    /* Utiliy classes */

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Specific components styling */

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      /* height: 100vh; */
    }

    #results {
      overflow-y: auto;
    }
    #results .result-item {
      margin-bottom: 32px;
      font-size: 85%;
      align-items: flex-start;
      gap: 18px;
    }
    #results .result-item:hover img {
      filter: brightness(0.7);
    }
    #results .result-item img.thumbnail {
      width: 120px;
    }
    #results .result-item button {
      opacity: .75;
    }
    #results .result-item button {
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: darkred;
    }

    .progress {
      height: 10px;
      border-radius: 4px;
      background: #222;
      position: relative;
      cursor: pointer;
    }
    .progress .buffered {
      position: absolute;
      height: 100%;
      background: #444;
      width: 0%;
    }
    .progress .played {
      position: absolute;
      height: 100%;
      background: #4da3ff;
      width: 0%;
    }
  </style>
</head>

<body>
<div class="app">
  <div class="row" style="align-items:center">
    <h1 style="font-size: 24px; color: gray; margin-top:0">
      <span>🎧</span>
      <span>YT Audio</span>
    </h1>
    <!--
    <div>
      <a href="https://github.com/damiencorpataux/yt-dlp-audio-api">
        <img height="15px" src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg">
        Fork me
      </a>
    </div>
    -->
  </div>

  <!-- SEARCH -->
  <form class="row" onsubmit="search(); return false;">
    <input id="searchInput" autofocus placeholder="♪ Search or paste URL" style="flex:1">
    <button>Search</button>
  </form>

  <hr>

  <!-- PLAYER -->
  <div style="margin-bottom:10px; min-height:1lh">
    <strong id="trackname"></strong>
  </div>
  <div class="row" style="gap:12px; align-items:center; justify-content:space-between">
    <button id="play" style="width:32px">⌛</button>
    <span id="time" style="font-family:monospace">0:00/0:00</span>
    <div id="progressBar" class="progress" style="flex:1">
      <div id="bufferedBar" class="buffered"></div>
      <div id="playedBar" class="played"></div>
    </div>
  </div>

  <hr>

  <!-- RESULTS -->
  <div id="results">
  </div>

  <audio id="audio"></audio>
</div>

<script>
const API_URL = "";

const ui = {
  audio: document.getElementById("audio"),
  search: document.getElementById("searchInput"),
  results: document.getElementById("results"),
  trackname: document.getElementById("trackname"),
  play: document.getElementById("play"),
  time: document.getElementById("time"),
  playedBar: document.getElementById("playedBar"),
  bufferedBar: document.getElementById("bufferedBar"),
  progressBar: document.getElementById("progressBar")
};

function formatTime(t, fallback) {
  fallback = fallback || '?:??';
  if (isNaN(t) || t == null) return fallback;
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.textContent;
}

/* ---------------- SEARCH ---------------- */

function isURL(str) {
  return str.startsWith("http://") || str.startsWith("https://");
}

async function search() {
  const q = ui.search.value.trim();

  // 🔥 Direct play if URL
  if (isURL(q)) {
    ui.results.innerHTML = `🎶 Playing <q>${q}</q>...`;
    play(q);
    return;
  }

  ui.search.parentNode.querySelector("button").disabled = true;
  ui.results.innerHTML = `🎶 Searching for <q>${escapeHTML(q)}</q>...`;

  let data;
  try {
    const res = await fetch(`${API_URL}/search?q=${encodeURIComponent(q)}`);
    data = await res.json();
  } catch(e) {
    alert(`❌ Search failed. Please try again.\n\n${String(e)}`);
    ui.results.innerHTML = "";
    throw(e);
  } finally {
    ui.search.parentNode.querySelector("button").disabled = false;
    ui.search.blur();
  }

  ui.search.value = "";
  ui.results.innerHTML = "";

  data.results.forEach(r => {
    const div = document.createElement("div");
    div.className = "row result-item";

    div.innerHTML = `
      <div style="position:relative; display:inline-block;">
        <img class="thumbnail" src="${r.thumbnail}" style="display:block">
        <button style="position:absolute; bottom:2px; right:2px">
          ▶︎
        </button>
      </div>
      <div style="flex:1;">
        <p><strong>${escapeHTML(r.title)}</strong></p>
        <p>${formatTime(r.duration, '-')}</p>
        <p>
          <img width="16px" alt="${r.provider}" src="${
            {
              'bandcamp': 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Bandcamp-button-bc-circle-green.svg/960px-Bandcamp-button-bc-circle-green.svg.png',
              'youtube': 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/YouTube_full-color_icon_%282024%29.svg/1280px-YouTube_full-color_icon_%282024%29.svg.png'
            }[r.provider] || 'default_url'
          }">
          ${escapeHTML(r.channel)}
        </p>
      </div>
    `;

    div.querySelector("button").onclick = () => play(r.url);

    ui.results.appendChild(div);
  });
}

/* ---------------- PLAYER ---------------- */

// Play URL
async function play(url) {
  ui.trackname.innerHTML = '♪ Loading track...'
  window.scrollTo({top: 0, behavior: 'smooth'});
  // Play URL
  try {
    ui.audio.src = `${API_URL}/stream?url=${encodeURIComponent(url)}`;
    await ui.audio.play();  // FIXME: make async
  } catch(e) {
    alert(`❌ Playback failed. Please try again.\n\n${String(e)}`);
    ui.trackname.innerHTML = '';
    throw(e);
  }
  // Display title
  const res = await fetch(`${API_URL}/info?url=${encodeURIComponent(url)}`);  // FIXME: make async
  data = await res.json();
  ui.trackname.innerHTML = escapeHTML(data.title || 'Unknown');
}

// Toggle play/pause
ui.play.addEventListener("click", () => {
  if (ui.audio.paused) {
    ui.audio.play();
  } else {
    ui.audio.pause();
  }
});

// Update playback time
ui.audio.addEventListener("timeupdate", () => {
  const current = ui.audio.currentTime;
  const duration = ui.audio.duration;

  ui.time.textContent = `${formatTime(current)}/${formatTime(duration)}`;

  if (duration > 0) {
    ui.playedBar.style.width = (current / duration * 100) + "%";
  }
});

// Handle play button enable/disable state and icon
function playEnable(enable) {
  if (enable === null) enable = true;
  if (enable) {
    const icon = ui.audio.paused ? "⏸︎" : "▶︎";
    ui.play.innerHTML = icon;
    ui.play.disabled = false;
  } else {
    ui.play.innerHTML = "⌛";
    ui.play.disabled = true;
  }
}
playEnable(false);  // Start disabled
ui.audio.addEventListener("canplay", () => playEnable(true));
ui.audio.addEventListener("loadstart", () => playEnable(false));
ui.audio.addEventListener("waiting", () => playEnable(false));
ui.audio.addEventListener("stalled", () => playEnable(false));
ui.audio.addEventListener("play", () => playEnable(true));
ui.audio.addEventListener("pause", () => playEnable(true));

// Track duration progress bar
ui.audio.addEventListener("progress", () => {
  if (ui.audio.buffered.length > 0 && ui.audio.duration > 0) {

    const bufferedEnd = ui.audio.buffered.end(ui.audio.buffered.length - 1);

    const percent = (bufferedEnd / ui.audio.duration) * 100;
    ui.bufferedBar.style.width = percent + "%";
  }
});

// Track seeking on progress bar
function handleSeek(clientX) {
  if (!ui.audio.duration) return;
  const rect = ui.progressBar.getBoundingClientRect();
  const ratio = (clientX - rect.left) / rect.width;
  const targetTime = ratio * ui.audio.duration;
  ui.audio.currentTime = targetTime;
}
ui.progressBar.addEventListener("click", (e) => handleSeek(e.clientX));  // Desktop
ui.progressBar.addEventListener("touchstart", (e) => handleSeek(e.touches[0].clientX));  // Mobile

// Debug
ui.audio.addEventListener("loadstart", () => console.log("loadstart"));
ui.audio.addEventListener("loadedmetadata", () => console.log("metadata loaded"));
ui.audio.addEventListener("canplay", () => console.log("can play"));
ui.audio.addEventListener("waiting", () => console.log("waiting"));
ui.audio.addEventListener("stalled", () => console.log("stalled"));

</script>

</body>
</html>
